async function dDel(t,id){

          <span style={bg2(t.status==="Activo"?"#22c55e":"#6b7280")}>{t.status}</span>
        </div>
        {isA?<div style={{minWidth:0}}>
          {t.url&&<div style={{fontSize:10,color:s2,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}}>{t.url}</div>}
          {t.loginEmail&&<div style={{fontSize:9,color:mt,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Login: {t.loginEmail}</div>}
          {t.notes&&<div style={{fontSize:9,color:mt,marginBottom:6,lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{t.notes}</div>}
          <div style={{borderTop:`1px solid ${bd}`,paddingTop:8,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
            <div><span style={{fontSize:10,color:mt}}>{t.billing}</span><div style={{fontSize:14,fontWeight:800,color:t.billing==="Gratis"?"#22c55e":"#ff6b6b"}}>{t.billing==="Gratis"?"Gratis":fm(t.cost)}{t.billing==="Mensual"?"/mes":t.billing==="Anual"?"/año":""}</div>{t.currency==="MXN"&&<div style={{fontSize:8,color:mt}}>≈ {fmShort(toUSD(t.cost,t.currency))} USD</div>}</div>
            <div style={{textAlign:"right"}}><span style={{fontSize:9,color:mt}}>Paga:</span><div style={{fontSize:11,fontWeight:700,color:pc}}>{t.paidBy==="Cliente"?t.paidByName||"Cliente":t.paidBy==="Inversor"?t.paidByName||"Inversor":"STRYV"}</div></div>
          </div>
        </div>:<div style={{borderTop:`1px solid ${bd}`,paddingTop:8,fontSize:10,color:mt}}>🔒 Restringido</div>}
      </div>})}
    </div>
  </div>}
</div>)}

{/* TOOL FORM */}
{vw==="stack"&&sub==="tF"&&(<div style={{maxWidth:600,width:"100%"}}>
  <div style={{fontSize:17,fontWeight:800,marginBottom:20}}>{eid?"Editar":"Nueva herramienta"}</div>
  <div className="g2" style={{marginBottom:16}}>
    <div><label style={lb}>Nombre *</label><input value={tF.name} onChange={e=>setTF({...tF,name:e.target.value})} style={iS}/></div>
    <div><label style={lb}>Categoría</label><select value={tF.category} onChange={e=>setTF({...tF,category:e.target.value})} style={iS}>{TCATS.map(c=><option key={c}>{c}</option>)}</select></div>
  </div>
  <div className="g3" style={{marginBottom:16}}>
    <div><label style={lb}>Costo</label><div style={{display:"flex",gap:4}}><input value={tF.cost} onChange={e=>setTF({...tF,cost:e.target.value})} type="number" style={{...iS,flex:1}}/><CurSel val={tF.currency} onChange={v=>setTF({...tF,currency:v})}/></div>{tF.currency==="MXN"&&<div style={{fontSize:8,color:mt,marginTop:2}}>≈ {fmShort(toUSD(tF.cost,tF.currency))} USD</div>}</div>
    <div><label style={lb}>Ciclo</label><select value={tF.billing} onChange={e=>setTF({...tF,billing:e.target.value})} style={iS}>{BILL.map(b=><option key={b}>{b}</option>)}</select></div>
    <div><label style={lb}>Estado</label><select value={tF.status} onChange={e=>setTF({...tF,status:e.target.value})} style={iS}><option>Activo</option><option>Inactivo</option><option>Trial</option></select></div>
  </div>
  <div className="g2" style={{marginBottom:16}}>
    <div><label style={lb}>URL</label><input value={tF.url} onChange={e=>setTF({...tF,url:e.target.value})} style={iS}/></div>
    <div><label style={lb}>Email login</label><input value={tF.loginEmail} onChange={e=>setTF({...tF,loginEmail:e.target.value})} style={iS}/></div>
  </div>
  <div className="g2" style={{marginBottom:16}}>
    <div><label style={lb}>¿Quién paga?</label><select value={tF.paidBy||"STRYV"} onChange={e=>setTF({...tF,paidBy:e.target.value,paidByName:""})} style={iS}><option value="STRYV">STRYV</option><option value="Inversor">Inversor</option><option value="Cliente">Cliente</option></select></div>
    {tF.paidBy==="Cliente"&&<div><label style={lb}>¿Qué cliente?</label><select value={tF.paidByName||""} onChange={e=>setTF({...tF,paidByName:e.target.value})} style={iS}><option value="">—</option>{cl.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></div>}
    {tF.paidBy==="Inversor"&&<div><label style={lb}>¿Qué inversor?</label><select value={tF.paidByName||""} onChange={e=>setTF({...tF,paidByName:e.target.value})} style={iS}><option value="">—</option>{tm.filter(m=>(m.roles||[]).includes("Inversionista")).map(m=><option key={m.id} value={m.name}>{m.name}</option>)}</select></div>}
  </div>
  <div style={{marginBottom:20}}><label style={lb}>Notas</label><textarea value={tF.notes} onChange={e=>setTF({...tF,notes:e.target.value})} rows={2} style={{...iS,resize:"vertical"}}/></div>
  <div className="mob-wrap" style={{display:"flex",gap:8}}>
    <button onClick={()=>sv("tools",tF,setTF,eT)} style={{background:tl,border:"none",color:bg,padding:"12px 24px",borderRadius:8,fontSize:13,minHeight:44,fontWeight:700,cursor:"pointer"}}>{eid?"Guardar":"Agregar"}</button>
    <button onClick={()=>{setSub(null);setEid(null)}} style={{background:"transparent",border:`1px solid ${bd}`,color:s2,padding:"12px 24px",borderRadius:8,fontSize:13,minHeight:44,cursor:"pointer"}}>Cancelar</button>
    {eid&&isA&&<button onClick={()=>dl("tools",eid)} style={{background:"rgba(255,107,107,.1)",border:"1px solid rgba(255,107,107,.3)",color:"#ff6b6b",padding:"12px 18px",borderRadius:8,fontSize:12,minHeight:44,cursor:"pointer",marginLeft:"auto"}}>Eliminar</button>}
  </div>
</div>)}

</div>
</div>);
}
class EB extends React.Component{constructor(p){super(p);this.state={err:null}}static getDerivedStateFromError(e){return{err:e}}componentDidCatch(e,i){console.error("STRYV Error:",e,i)}render(){if(this.state.err)return <div style={{padding:40,textAlign:"center",color:"#ff6b6b",background:"#0a0c10",minHeight:"100vh"}}><h2>Error en el dashboard</h2><pre style={{fontSize:12,color:"#e0e6e4",marginTop:16,textAlign:"left",maxWidth:600,margin:"16px auto",whiteSpace:"pre-wrap"}}>{this.state.err.toString()}</pre><button onClick={()=>this.setState({err:null})} style={{marginTop:16,background:"#4ECDC4",border:"none",color:"#0a0c10",padding:"12px 24px",borderRadius:8,fontSize:13,minHeight:44,fontWeight:700,cursor:"pointer"}}>Reintentar</button></div>;return this.props.children}}
ReactDOM.createRoot(document.getElementById("root")).render(<EB><App/></EB>);
</script>
